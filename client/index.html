    <!-- Fix for Firebase Firestore WebChannel Image() constructor crash -->
    <script>
      // Prevent "Failed to construct 'Image'" error from Firebase minified code
      (function() {
        if (typeof window !== 'undefined' && typeof window.Image === 'function') {
          const OriginalImage = window.Image;
          // Ensure Image can be called with or without 'new'
          window.Image = function Image() {
            if (new.target === undefined) {
              return new OriginalImage();
            }
            return new OriginalImage();
          };
          window.Image.prototype = OriginalImage.prototype;
        }
      })();
    </script>
